name: demo

on:
  push:
    branches:
      - main

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npm run test:ci:api
        env:
          API_BASE_URL: ${{ secrets.QA_API_BASE_URL }}
          API_KEY: ${{ secrets.QA_API_KEY }}
          API_LOGIN: ${{ secrets.QA_API_LOGIN }}
          API_PASSWORD: ${{ secrets.QA_API_PASSWORD }}

      - name: Upload API test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-allure-results
          path: allure-results/

  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest
    needs: api-tests # runs only after api-tests passes
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Run UI tests
        run: npm run test:ci:ui
        env:
          BASE_URL: ${{ secrets.QA_BASE_URL }}
          API_BASE_URL: ${{ secrets.QA_API_BASE_URL }}
          API_KEY: ${{ secrets.QA_API_KEY }}
          API_LOGIN: ${{ secrets.QA_API_LOGIN }}
          API_PASSWORD: ${{ secrets.QA_API_PASSWORD }}
          QA_USER: ${{ secrets.QA_USER }}
          QA_PASSWORD: ${{ secrets.QA_PASSWORD }}

      - name: Upload UI test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-allure-results
          path: allure-results/
