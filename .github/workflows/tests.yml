name: demo

on:
  push:
    branches:
      - main
  # Manual trigger for updating visual snapshots.
  # workflow_dispatch:
  #   inputs:
  #     update_snapshots:
  #       description: 'Update visual snapshots'
  #       type: boolean
  #       default: false

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble

    steps:
      - uses: actions/checkout@v5

      - name: Install Java
        if: always()
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npm run test:ci:api
        env:
          TEST_ENV: qa
          API_BASE_URL: ${{ secrets.QA_API_BASE_URL }}
          API_KEY: ${{ secrets.QA_API_KEY }}
          API_LOGIN: ${{ secrets.QA_API_LOGIN }}
          API_PASSWORD: ${{ secrets.QA_API_PASSWORD }}

      - name: Upload API test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: api-allure-results
          path: allure-results/

      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results -o allure-report --clean

      - name: Deploy Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report/
          destination_dir: api

  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest
    needs: api-tests
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble

    steps:
      - uses: actions/checkout@v5
      - run: npm ci

      - name: Run UI tests
        run: npm run test:ci:ui
        env:
          TEST_ENV: qa
          BASE_URL: ${{ secrets.QA_BASE_URL }}
          API_BASE_URL: ${{ secrets.QA_API_BASE_URL }}
          API_KEY: ${{ secrets.QA_API_KEY }}
          API_LOGIN: ${{ secrets.QA_API_LOGIN }}
          API_PASSWORD: ${{ secrets.QA_API_PASSWORD }}
          UI_USER: ${{ secrets.QA_USER }}
          UI_PASSWORD: ${{ secrets.QA_PASSWORD }}

      - name: Upload UI test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: ui-allure-results
          path: allure-results/

      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results -o allure-report --clean

      - name: Deploy Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report/
          destination_dir: ui

  update-snapshots:
    name: Update Visual Snapshots
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.update_snapshots == 'true' }} # manual only
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble

    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - run: npm ci

      - name: Update snapshots
        run: npm run test:ci:update-snapshots
        env:
          TEST_ENV: qa
          BASE_URL: ${{ secrets.QA_BASE_URL }}
          API_BASE_URL: ${{ secrets.QA_API_BASE_URL }}
          API_KEY: ${{ secrets.QA_API_KEY }}
          API_LOGIN: ${{ secrets.QA_API_LOGIN }}
          API_PASSWORD: ${{ secrets.QA_API_PASSWORD }}
          UI_USER: ${{ secrets.QA_USER }}
          UI_PASSWORD: ${{ secrets.QA_PASSWORD }}
